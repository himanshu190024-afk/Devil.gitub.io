<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Key Available</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)}.card{background:#ffffff12;padding:30px;border-radius:20px;color:#fff;text-align:center;backdrop-filter:blur(10px);width:340px}.key{background:#fff;color:#111;padding:16px;border-radius:10px;font-size:24px;font-weight:bold;margin:20px 0}button{padding:14px 20px;width:100%;border:0;border-radius:10px;background:#00c853;color:#fff;font-size:18px;cursor:pointer}
</style></head><body><div class="card"><h2>🔑 KEY</h2><div class="key" id="k">AVILABLE</div><button onclick="navigator.clipboard.writeText(document.getElementById('k').innerText).then(()=>alert('Key Copied!'))">📋 Copy Key</button></div></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Key</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);font-family:Arial}.card{background:#ffffff15;padding:30px;border-radius:20px;color:#fff;text-align:center;backdrop-filter:blur(8px)}.key{margin:20px 0;padding:15px;border:2px solid #00ff99;border-radius:10px;color:#00ff99;font-weight:bold;font-size:24px}button{padding:12px 24px;border:none;border-radius:10px;background:#00c853;color:#fff;font-weight:bold;cursor:pointer}</style></head><body><div class="card"><h2>🔑 KEY AVAILABLE</h2><div class="key" id="k">HAPPY FAMILY</div><button onclick="navigator.clipboard.writeText(document.getElementById('k').innerText).then(()=>alert('Key Copied!'));">COPY KEY</button></div></body></html>
